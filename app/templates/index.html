<!DOCTYPE html>
<html>
<head>
    <title>Enterprise Mobile Auth Lab</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: white; padding: 40px; }
        .card { max-width: 550px; margin: auto; background: #1e293b; padding: 30px; border-radius: 12px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; }
        button { background: #2563eb; color: white; }
        .error { color: #fca5a5; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Enterprise Mobile Authentication Lab</h1>
        <p>Demo flow: Password → OTP → Biometric → Voice → JWT → Protected API</p>
        <p><strong>Demo user:</strong> richard / Password123!</p>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
