<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111827; color: white; padding: 40px; }
        .card { max-width: 550px; margin: auto; background: #1f2937; padding: 30px; border-radius: 12px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: none; }
        button { background: #0ea5e9; color: white; }
        .otp-box { background: #334155; padding: 14px; margin-top: 15px; border-radius: 8px; }
        .error { color: #fca5a5; }
    </style>
</head>
<body>
    <div class="card">
        <h1>OTP Verification</h1>
        <p>User: {{ username }}</p>
        <div class="otp-box">
            <strong>Lab OTP:</strong> {{ otp }}
        </div>
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="POST" action="/verify-otp">
            <input type="text" name="otp" placeholder="Enter OTP" required>
            <button type="submit">Verify OTP</button>
        </form>
    </div>
</body>
</html>
