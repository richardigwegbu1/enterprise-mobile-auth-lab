name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile app/app.py

      - name: Verify important project files exist
        run: |
          test -f app/app.py
          test -f apache/mobile-auth-lab.conf
          test -f systemd/enterprise-mobile-auth-lab.service
          test -f README.md
